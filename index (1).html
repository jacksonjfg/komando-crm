<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>KØMANDO CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:       #0c0c0a;
      --surface:  #141410;
      --card:     #1a1a14;
      --card-h:   #201f18;
      --border:   #252520;
      --border-h: #38372e;
      --gold:     #c8a84b;
      --gold-l:   #e8c878;
      --gold-d:   #9a7e33;
      --olive:    #4a5c2a;
      --muted:    #6a6a58;
      --text:     #e2dece;
      --text-2:   #9a9882;
      --green:    #5a8a3a;
      --blue:     #3a6a9a;
      --brown:    #8a4a2a;
      --r:        12px;
      --r-sm:     8px;
      --nav-h:    56px;
    }
    html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5; }
    body { min-height: 100dvh; overscroll-behavior: none; }
    .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: .05em; }

    /* ── SCROLLBAR ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 2px; }

    /* ── LOADING SCREEN ──────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 999;
      transition: opacity .4s ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading .logo { font-size: 42px; color: var(--gold); letter-spacing: .1em; }
    #loading .spinner {
      width: 32px; height: 32px; border: 2px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOPBAR ───────────────────────────────────────────── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: rgba(12,12,10,.92); backdrop-filter: blur(12px);
      border-bottom: .5px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      z-index: 100;
    }
    #topbar .back-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: .5px solid var(--border); background: var(--card);
      display: none; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gold); font-size: 18px; flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    #topbar .back-btn:hover { background: var(--card-h); border-color: var(--border-h); }
    #topbar .back-btn.visible { display: flex; }
    #topbar .logo-text { font-size: 20px; color: var(--gold); line-height: 1; flex-shrink: 0; }
    #topbar .logo-text sup { font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; vertical-align: super; margin-left: 3px; }
    #topbar .page-title { font-size: 13px; color: var(--text-2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #topbar .sync-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      flex-shrink: 0; transition: background .3s;
    }
    #topbar .sync-dot.syncing { background: var(--gold); animation: pulse .6s ease infinite alternate; }
    #topbar .sync-dot.ok { background: var(--green); }
    @keyframes pulse { to { opacity: .4; } }

    /* ── MAIN CONTENT ─────────────────────────────────────── */
    #app { padding-top: var(--nav-h); min-height: 100dvh; }

    /* ── SCREENS ──────────────────────────────────────────── */
    .screen { display: none; padding: 20px 16px 40px; animation: slideIn .22s ease; }
    .screen.active { display: block; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    /* ── SECTION LABEL ────────────────────────────────────── */
    .sec-label {
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); font-weight: 500; margin: 0 0 12px;
    }

    /* ── HOME ─────────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
    .stat-box {
      background: var(--card); border: .5px solid var(--border);
      border-radius: var(--r-sm); padding: 14px 12px; text-align: center;
    }
    .stat-box .sv { font-size: 26px; color: var(--gold); line-height: 1; }
    .stat-box .sl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 3px; }

    .areas-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
    .area-pill {
      padding: 5px 12px; border-radius: 20px;
      border: .5px solid var(--border); font-size: 12px; color: var(--muted);
    }

    .home-mandala-card {
      background: var(--card); border: .5px solid var(--border);
      border-radius: var(--r); padding: 24px 16px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      cursor: pointer; transition: border-color .2s, background .2s;
    }
    .home-mandala-card:hover { border-color: var(--gold-d); background: var(--card-h); }
    .home-mandala-card .hmc-label { font-size: 12px; color: var(--muted); }

    /* ── CONSULTORES GRID ─────────────────────────────────── */
    .consul-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .consul-card {
      background: var(--card); border: .5px solid var(--border);
      border-radius: var(--r-sm); padding: 14px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .consul-card:hover { border-color: var(--gold-d); background: var(--card-h); }
    .consul-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--olive); border: 1.5px solid var(--gold-d);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500; color: var(--gold-l);
    }
    .consul-name { font-size: 12px; font-weight: 500; text-align: center; }
    .consul-sub  { font-size: 10px; color: var(--muted); text-align: center; }
    .consul-pct-bar { width: 100%; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-top: 2px; }
    .consul-pct-fill { height: 2px; background: var(--gold); border-radius: 1px; }

    /* ── EMPRESAS LIST ────────────────────────────────────── */
    .empresa-list { display: flex; flex-direction: column; gap: 8px; }
    .empresa-row {
      background: var(--card); border: .5px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .empresa-row:hover { border-color: var(--gold-d); background: var(--card-h); }
    .empresa-num {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(200,168,75,.1); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; color: var(--gold);
    }
    .empresa-info { flex: 1; min-width: 0; }
    .empresa-nome { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empresa-seg  { font-size: 11px; color: var(--muted); }
    .empresa-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .empresa-pct  { font-size: 13px; font-weight: 500; color: var(--gold); }
    .empresa-mini-bar { width: 40px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .empresa-mini-fill { height: 3px; background: var(--gold); border-radius: 2px; }
    .empresa-chevron { color: var(--muted); font-size: 16px; }

    /* ── EMPRESA DETAIL ───────────────────────────────────── */
    .mandala-section {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; margin-bottom: 24px;
    }
    .mandala-wrap { position: relative; width: 240px; height: 240px; }
    .mandala-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; text-align: center;
    }
    .mandala-pct { font-size: 36px; color: var(--gold); line-height: 1; }
    .mandala-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }
    .mandala-nome { font-size: 11px; color: var(--text-2); margin-top: 6px; max-width: 100px; text-align: center; line-height: 1.3; }

    .eixos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .eixo-card {
      background: var(--card); border: .5px solid var(--border);
      border-radius: var(--r); padding: 14px 12px;
      cursor: pointer; transition: border-color .15s, background .15s;
      position: relative; overflow: hidden;
    }
    .eixo-card:hover { border-color: var(--border-h); background: var(--card-h); }
    .eixo-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 3px 0 0 3px;
    }
    .eixo-card[data-eixo="gestao_pessoas"]::before     { background: var(--green); }
    .eixo-card[data-eixo="vendas_posicionamento"]::before { background: var(--gold); }
    .eixo-card[data-eixo="performance_financeira"]::before { background: var(--blue); }
    .eixo-card[data-eixo="processos_operacionais"]::before { background: var(--brown); }
    .eixo-icon  { font-size: 18px; margin-bottom: 8px; display: block; }
    .eixo-short { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
    .eixo-nome  { font-size: 12px; font-weight: 500; line-height: 1.35; margin: 4px 0 10px; }
    .eixo-pct-big { font-size: 24px; color: var(--gold); line-height: 1; }
    .eixo-bar-bg   { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }
    .eixo-bar-fill { height: 3px; border-radius: 2px; transition: width .5s ease; }
    .eixo-arrow { position: absolute; bottom: 10px; right: 12px; color: var(--muted); font-size: 14px; opacity: .5; }
    .eixo-done-count { font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* ── TAREFAS ──────────────────────────────────────────── */
    .tarefas-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: .5px solid var(--border);
    }
    .eixo-badge-pill {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: .5px solid var(--gold-d); color: var(--gold);
      background: rgba(200,168,75,.08);
    }
    .tarefas-pct-display { margin-left: auto; font-size: 22px; color: var(--gold); }
    .tarefa-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0; border-bottom: .5px solid var(--border);
    }
    .tarefa-row:last-child { border-bottom: none; }
    .tarefa-check {
      width: 20px; height: 20px; border-radius: 5px;
      border: 1.5px solid var(--border-h); flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .tarefa-check.done { background: var(--gold); border-color: var(--gold); }
    .tarefa-check.done::after { content: '✓'; font-size: 12px; color: #0c0c0a; font-weight: 700; line-height: 1; }
    .tarefa-text { font-size: 13px; line-height: 1.55; flex: 1; transition: color .15s, text-decoration .15s; }
    .tarefa-text.done { text-decoration: line-through; color: var(--muted); }

    /* ── EDIT MODAL ───────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px); z-index: 200;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: .5px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 20px 16px 36px;
      width: 100%; max-width: 480px;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--border-h); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; }
    .modal input, .modal select {
      width: 100%; background: var(--card); border: .5px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; padding: 10px 12px; margin-bottom: 10px;
      outline: none; transition: border-color .15s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--gold-d); }
    .modal select option { background: var(--card); }
    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .btn {
      flex: 1; padding: 11px; border-radius: var(--r-sm);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; border: .5px solid var(--border); transition: all .15s;
    }
    .btn-ghost { background: var(--card); color: var(--text-2); }
    .btn-ghost:hover { background: var(--card-h); }
    .btn-primary { background: var(--gold); color: #0c0c0a; border-color: var(--gold); }
    .btn-primary:hover { background: var(--gold-l); }
    .btn-danger { background: transparent; color: #c45a3a; border-color: #c45a3a33; font-size: 13px; }
    .btn-danger:hover { background: rgba(196,90,58,.1); }

    /* ── FAB ──────────────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--gold); color: #0c0c0a;
      display: none; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 300; cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,168,75,.3);
      border: none; transition: transform .15s, background .15s;
      z-index: 50;
    }
    .fab:hover { transform: scale(1.08); background: var(--gold-l); }
    .fab.visible { display: flex; }

    /* ── TOAST ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: .5px solid var(--border);
      border-radius: 8px; padding: 8px 16px; font-size: 13px; color: var(--text-2);
      opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 300;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── EMPTY STATE ──────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 48px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .empty-state .ei { font-size: 36px; opacity: .4; }
    .empty-state .et { font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo display">KØMANDO</div>
  <div class="spinner"></div>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
  <div class="logo-text display">KØ<sup>CRM</sup></div>
  <div class="page-title" id="page-title"></div>
  <div class="sync-dot" id="sync-dot"></div>
</div>

<!-- APP -->
<div id="app">

  <!-- S1: HOME -->
  <div class="screen active" id="s-home">
    <div class="stats-row" id="home-stats">
      <div class="stat-box"><div class="sv display" id="st-consultores">—</div><div class="sl">Consultores</div></div>
      <div class="stat-box"><div class="sv display" id="st-empresas">—</div><div class="sl">Empresas</div></div>
      <div class="stat-box"><div class="sv display" id="st-media">—</div><div class="sl">Impl. média</div></div>
    </div>

    <p class="sec-label">Áreas internas</p>
    <div class="areas-wrap">
      <div class="area-pill">CS</div>
      <div class="area-pill">Financeiro</div>
      <div class="area-pill">Comercial</div>
      <div class="area-pill">Suporte</div>
      <div class="area-pill">Times</div>
    </div>

    <p class="sec-label">Clientes</p>
    <div class="home-mandala-card" onclick="goConsultores()">
      <svg id="home-mandala-svg" width="180" height="180" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="82" fill="none" stroke="#252520" stroke-width="20"/>

        <circle cx="100" cy="100" r="62" fill="#1a1a14"/>
        <line x1="100" y1="20" x2="100" y2="180" stroke="#252520" stroke-width=".5"/>
        <line x1="20"  y1="100" x2="180" y2="100" stroke="#252520" stroke-width=".5"/>
        <circle cx="100" cy="100" r="7"  fill="none" stroke="#c8a84b" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="2.5" fill="#c8a84b"/>

              font-size="17" fill="#c8a84b" letter-spacing="3">KØMANDO</text>
        <text id="home-pct-text" x="100" y="110" text-anchor="middle"
              font-family="'DM Sans',sans-serif" font-size="11" fill="#6a6a58">carregando...</text>
      </svg>
      <div class="hmc-label">Ver todos os consultores →</div>

  </div>

  <!-- S2: CONSULTORES -->
  <div class="screen" id="s-consultores">
    <p class="sec-label">Selecione o consultor</p>

  </div>

  <!-- S3: EMPRESAS -->
  <div class="screen" id="s-empresas">
    <p class="sec-label" id="empresas-label">Empresas</p>
    <div class="empresa-list" id="empresa-list"></div>
  </div>

  <!-- S4: EMPRESA DETAIL -->
  <div class="screen" id="s-empresa">
    <div class="mandala-section">
      <div class="mandala-wrap">
        <svg id="emp-mandala-svg" width="240" height="240" viewBox="0 0 240 240"></svg>
        <div class="mandala-center">
          <div class="mandala-pct display" id="emp-pct">—</div>
          <div class="mandala-lbl">implementado</div>
          <div class="mandala-nome" id="emp-nome-sub">—</div>
        </div>
      </div>
    </div>
    <p class="sec-label">Eixos da Arquitetura Blindada</p>
    <div class="eixos-grid" id="eixos-grid"></div>

  <!-- S5: TAREFAS -->
  <div class="screen" id="s-tarefas">
    <div class="tarefas-header">
      <div class="eixo-badge-pill" id="eixo-badge">—</div>
      <div class="tarefas-pct-display display" id="tarefas-pct">0%</div>
    </div>
    <div id="tarefa-list"></div>
  </div>
</div>

<!-- FAB (adicionar empresa / tarefa) -->

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nova empresa</div>
    <div id="modal-body"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ── FIREBASE ─────────────────────────────────────────────── -->
<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, push, remove }
                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── CONFIG FIREBASE ───────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyA-zAl2ZzS2zAYYSfFvC5o0kJr0YPgWZ0",
  authDomain:        "komando-crm.firebaseapp.com",
  databaseURL:       "https://komando-crm-default-rtdb.firebaseio.com",
  projectId:         "komando-crm",
  storageBucket:     "komando-crm.firebasestorage.app",
  messagingSenderId: "799056525182",
  appId:             "1:799056525182:web:9889f2851255c60056a52f",
  measurementId:     "G-B2564RR78D"
};
// ─────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── STATE ─────────────────────────────────────────────────────
let STATE = {
  data:       null,   // all data from Firebase
  screen:     'home',
  consulId:   null,
  empresaId:  null,
  eixoId:     null,
};

// expose for seed.js
window.getDatabase  = getDatabase;
window.firebaseApp  = app;

// ── REFS HELPERS ──────────────────────────────────────────────
const rootRef    = () => ref(db, 'komando/consultores');
const consulRef  = (cid)              => ref(db, `komando/consultores/${cid}`);
const empresaRef = (cid, eid)         => ref(db, `komando/consultores/${cid}/empresas/${eid}`);
const eixoRef    = (cid, eid, xid)    => ref(db, `komando/consultores/${cid}/empresas/${eid}/eixos/${xid}`);
const tarefaRef  = (cid, eid, xid, t) => ref(db, `komando/consultores/${cid}/empresas/${eid}/eixos/${xid}/tarefas/${t}`);

// ── SYNC INDICATOR ────────────────────────────────────────────
const syncDot = document.getElementById('sync-dot');
function setSyncing() { syncDot.className = 'sync-dot syncing'; }
function setSynced()  { syncDot.className = 'sync-dot ok'; setTimeout(()=>syncDot.className='sync-dot', 2000); }

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── REALTIME LISTENER ─────────────────────────────────────────
onValue(rootRef(), snap => {
  STATE.data = snap.val() || {};
  document.getElementById('loading').classList.add('hide');
  renderCurrentScreen();
}, err => {
  console.error(err);
  document.getElementById('loading').innerHTML =
    `<div class="logo display" style="color:#c45a3a">ERRO</div>
     <div style="font-size:13px;color:#6a6a58;padding:0 24px;text-align:center">
       Configure o Firebase em index.html e rode o seed.js no console.
     </div>`;
});

// ── SCREEN ROUTER ─────────────────────────────────────────────
function renderCurrentScreen() {
  switch(STATE.screen) {
    case 'home':        renderHome();        break;
    case 'consultores': renderConsultores(); break;
    case 'empresas':    renderEmpresas();    break;
    case 'empresa':     renderEmpresa();     break;
    case 'tarefas':     renderTarefas();     break;
  }
}

function setScreen(id, title='') {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  document.getElementById('page-title').textContent = title;
  document.getElementById('back-btn').classList.toggle('visible', id !== 'home');
  document.getElementById('fab').classList.toggle('visible',
    id === 'consultores' || id === 'empresas' || id === 'tarefas');
  STATE.screen = id;
  window.scrollTo(0,0);
}

window.goBack = function() {
  const map = { consultores:'home', empresas:'consultores', empresa:'empresas', tarefas:'empresa' };
  const next = map[STATE.screen];
  if (!next) return;
  if (next === 'home') { STATE.consulId = null; STATE.empresaId = null; STATE.eixoId = null; }
  if (next === 'consultores') { STATE.empresaId = null; STATE.eixoId = null; }
  if (next === 'empresas') { STATE.eixoId = null; }
  STATE.screen = next;
  renderCurrentScreen();
  setScreen(next);
};

// ── HOME ──────────────────────────────────────────────────────
function renderHome() {
  setScreen('home');
  const consultores = STATE.data || {};
  const cids = Object.keys(consultores);
  let totalEmpresas = 0, totalPct = 0, count = 0;
  cids.forEach(cid => {
    const emps = consultores[cid].empresas || {};
    Object.values(emps).forEach(e => {
      totalEmpresas++;
      totalPct += e.pct || 0;
      count++;
    });
  });
  const media = count ? Math.round(totalPct / count) : 0;
  document.getElementById('st-consultores').textContent = cids.length;
  document.getElementById('st-empresas').textContent    = totalEmpresas;
  document.getElementById('st-media').textContent       = media + '%';
  document.getElementById('home-pct-text').textContent  = media + '% implementação média';
  const circ = 2 * Math.PI * 82;
  const arc  = (media / 100) * circ;
  document.getElementById('home-arc').setAttribute('stroke-dasharray', `${arc} ${circ - arc}`);
}

window.goConsultores = function() {
  STATE.screen = 'consultores';
  renderConsultores();
};

// ── CONSULTORES ───────────────────────────────────────────────
function renderConsultores() {
  setScreen('consultores', 'Consultores');
  const consultores = STATE.data || {};
  const grid = document.getElementById('consul-grid');
  grid.innerHTML = '';
  Object.entries(consultores).forEach(([cid, c]) => {
    const emps  = Object.values(c.empresas || {});
    const avg   = emps.length ? Math.round(emps.reduce((a,e)=>a+(e.pct||0),0)/emps.length) : 0;
    const inics = (c.nome||'??').slice(0,2).toUpperCase();
    const div = document.createElement('div');
    div.className = 'consul-card';
    div.innerHTML = `
      <div class="consul-avatar">${inics}</div>
      <div class="consul-name">${c.nome || cid}</div>
      <div class="consul-sub">${emps.length} emp</div>
      <div class="consul-pct-bar"><div class="consul-pct-fill" style="width:${avg}%"></div></div>
      <div class="consul-sub" style="margin-top:0">${avg}%</div>
    `;
    div.onclick = () => { STATE.consulId = cid; STATE.screen='empresas'; renderEmpresas(); };
    grid.appendChild(div);
  });
}

// ── EMPRESAS ──────────────────────────────────────────────────
function renderEmpresas() {
  const c = (STATE.data||{})[STATE.consulId] || {};
  setScreen('empresas', (c.nome||'') + ' — Empresas');
  document.getElementById('empresas-label').textContent = (c.nome||'Consultor') + ' — Empresas';
  const emps = c.empresas || {};
  const list = document.getElementById('empresa-list');
  list.innerHTML = '';
  const entries = Object.entries(emps);
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="ei">🏢</div><div class="et">Nenhuma empresa cadastrada</div></div>`;
    return;
  }
  entries.forEach(([eid, e], i) => {
    const row = document.createElement('div');
    row.className = 'empresa-row';
    row.innerHTML = `
      <div class="empresa-num">${i+1}</div>
      <div class="empresa-info">
        <div class="empresa-nome">${e.nome || eid}</div>
        <div class="empresa-seg">${e.seg || 'Negócios'}</div>
      </div>
      <div class="empresa-right">
        <div class="empresa-pct">${e.pct||0}%</div>
        <div class="empresa-mini-bar">
          <div class="empresa-mini-fill" style="width:${e.pct||0}%"></div>
        </div>
        <div class="empresa-chevron">›</div>
      </div>
    `;
    row.onclick = () => { STATE.empresaId = eid; STATE.screen='empresa'; renderEmpresa(); };
    list.appendChild(row);
  });
}

// ── EMPRESA DETAIL ────────────────────────────────────────────
function renderEmpresa() {
  const emp = ((STATE.data||{})[STATE.consulId]?.empresas||{})[STATE.empresaId] || {};
  setScreen('empresa', emp.nome || 'Empresa');
  document.getElementById('emp-pct').textContent     = (emp.pct||0) + '%';
  document.getElementById('emp-nome-sub').textContent = emp.nome || '';
  drawMandala(emp);
  const grid = document.getElementById('eixos-grid');
  grid.innerHTML = '';
  const EIXO_COR = {
    gestao_pessoas:       { cor: 'var(--green)', bg: 'rgba(90,138,58,.15)'  },
    vendas_posicionamento:{ cor: 'var(--gold)',  bg: 'rgba(200,168,75,.12)' },
    performance_financeira:{ cor: 'var(--blue)', bg: 'rgba(58,106,154,.15)' },
    processos_operacionais:{ cor: 'var(--brown)',bg: 'rgba(138,74,42,.15)'  },
  };
  Object.entries(emp.eixos || {}).forEach(([xid, eixo]) => {
    const c   = EIXO_COR[xid] || { cor:'var(--gold)', bg:'rgba(200,168,75,.1)' };
    const done = (eixo.tarefas||[]).filter(t=>t.done).length;
    const tot  = (eixo.tarefas||[]).length;
    const card = document.createElement('div');
    card.className = 'eixo-card';
    card.setAttribute('data-eixo', xid);
    card.innerHTML = `
      <span class="eixo-icon">${eixo.icon||'●'}</span>
      <div class="eixo-short">${eixo.short||xid}</div>
      <div class="eixo-nome">${eixo.nome||xid}</div>
      <div class="eixo-pct-big display">${eixo.pct||0}%</div>
      <div class="eixo-done-count">${done}/${tot} tarefas</div>
      <div class="eixo-bar-bg">
        <div class="eixo-bar-fill" style="width:${eixo.pct||0}%;background:${c.cor}"></div>
      </div>
      <div class="eixo-arrow">›</div>
    `;
    card.onclick = () => { STATE.eixoId = xid; STATE.screen='tarefas'; renderTarefas(); };
    grid.appendChild(card);
  });
}

function drawMandala(emp) {
  const svg = document.getElementById('emp-mandala-svg');
  const cx=120, cy=120, r=95, sw=22;
  const eixos = Object.entries(emp.eixos || {});
  const n = eixos.length || 4;
  const circ = 2*Math.PI*r;
  const segFull = circ/n;
  const gap = (5/360)*circ;
  const segNet = segFull - gap;
  const CORS = ['#5a8a3a','#c8a84b','#3a6a9a','#8a4a2a'];
  let h = `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e1e18" stroke-width="${sw+3}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#252520" stroke-width="${sw}"/>
  `;
  eixos.forEach(([,eixo], i) => {
    const filled = ((eixo.pct||0)/100) * segNet;
    const offset = -(i * segFull + gap/2) + circ*0.25;
    h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${CORS[i%4]}" stroke-width="${sw}"
      stroke-dasharray="${filled} ${circ-filled}"
      stroke-dashoffset="${offset}"
      stroke-linecap="round" opacity=".88"/>`;
  });
  h += `
    <line x1="${cx}" y1="${cy-r-sw-8}" x2="${cx}" y2="${cy+r+sw+8}" stroke="#252520" stroke-width=".5"/>
    <line x1="${cx-r-sw-8}" y1="${cy}" x2="${cx+r+sw+8}" y2="${cy}" stroke="#252520" stroke-width=".5"/>
    <circle cx="${cx}" cy="${cy}" r="${r-sw/2-8}" fill="#0f0f0c"/>
    <circle cx="${cx}" cy="${cy}" r="9"  fill="none" stroke="#c8a84b" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="#c8a84b"/>
  `;
  svg.innerHTML = h;
}

// ── TAREFAS ───────────────────────────────────────────────────
function renderTarefas() {
  const emp   = ((STATE.data||{})[STATE.consulId]?.empresas||{})[STATE.empresaId] || {};
  const eixo  = (emp.eixos||{})[STATE.eixoId] || {};
  setScreen('tarefas', eixo.nome || 'Tarefas');
  document.getElementById('eixo-badge').textContent   = eixo.nome || STATE.eixoId;
  document.getElementById('tarefas-pct').textContent  = (eixo.pct||0) + '%';
  const list = document.getElementById('tarefa-list');
  list.innerHTML = '';
  (eixo.tarefas || []).forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'tarefa-row';
    row.innerHTML = `
      <div class="tarefa-check ${t.done?'done':''}" data-idx="${i}"></div>
      <div class="tarefa-text ${t.done?'done':''}">${t.txt}</div>
    `;
    row.querySelector('.tarefa-check').onclick = () => toggleTarefa(i, !t.done);
    list.appendChild(row);
  });
}

async function toggleTarefa(idx, newDone) {
  setSyncing();
  const cid = STATE.consulId, eid = STATE.empresaId, xid = STATE.eixoId;
  const emp  = (STATE.data[cid]?.empresas||{})[eid] || {};
  const eixo = (emp.eixos||{})[xid] || {};

  // Update tarefa done
  await update(tarefaRef(cid, eid, xid, idx), { done: newDone });

  // Recalc eixo pct
  const tarefas = eixo.tarefas.map((t,i) => i===idx ? {...t,done:newDone} : t);
  const doneCnt = tarefas.filter(t=>t.done).length;
  const eixoPct = Math.round((doneCnt/tarefas.length)*100);
  await update(eixoRef(cid,eid,xid), { pct: eixoPct });

  // Recalc empresa pct
  const allEixos = {...(emp.eixos||{})};
  allEixos[xid] = {...allEixos[xid], pct: eixoPct};
  const empPct = Math.round(Object.values(allEixos).reduce((a,e)=>a+(e.pct||0),0)/Object.keys(allEixos).length);
  await update(empresaRef(cid,eid), { pct: empPct });

  setSynced();
  toast('✓ Salvo');
}

// ── FAB ACTIONS ───────────────────────────────────────────────
window.openFab = function() {
  if (STATE.screen === 'consultores') openAddConsultor();
  else if (STATE.screen === 'empresas') openAddEmpresa();
  else if (STATE.screen === 'tarefas') openAddTarefa();
};

function openAddConsultor() {
  document.getElementById('modal-title').textContent = 'Novo consultor';
  document.getElementById('modal-body').innerHTML = `
    <input id="m-nome" placeholder="Nome do consultor" autocomplete="off"/>
  `;
  document.getElementById('modal-btns').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveConsultor()">Adicionar</button>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
}

window.saveConsultor = async function() {
  const nome = document.getElementById('m-nome').value.trim();
  if (!nome) return;
  setSyncing();
  const newRef = push(rootRef());
  const eixosTemplate = buildEixosTemplate();
  await set(newRef, {
    nome,
    empresas: {}
  });
  setSynced();
  closeModal();
  toast('Consultor adicionado');
};

function openAddEmpresa() {
  document.getElementById('modal-title').textContent = 'Nova empresa';
  document.getElementById('modal-body').innerHTML = `
    <input id="m-nome" placeholder="Nome da empresa" autocomplete="off"/>
    <input id="m-seg"  placeholder="Segmento (ex: Food, Saúde, Tech)" autocomplete="off"/>
  `;
  document.getElementById('modal-btns').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveEmpresa()">Adicionar</button>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
}

window.saveEmpresa = async function() {
  const nome = document.getElementById('m-nome').value.trim();
  const seg  = document.getElementById('m-seg').value.trim() || 'Negócios';
  if (!nome) return;
  setSyncing();
  const empRef = push(ref(db, `komando/consultores/${STATE.consulId}/empresas`));
  await set(empRef, {
    nome, seg, pct: 0,
    eixos: buildEixosTemplate()
  });
  setSynced();
  closeModal();
  toast('Empresa adicionada');
};

function openAddTarefa() {
  document.getElementById('modal-title').textContent = 'Nova tarefa';
  document.getElementById('modal-body').innerHTML = `
    <input id="m-txt" placeholder="Descrição da tarefa" autocomplete="off"/>
  `;
  document.getElementById('modal-btns').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveTarefa()">Adicionar</button>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
}

window.saveTarefa = async function() {
  const txt = document.getElementById('m-txt').value.trim();
  if (!txt) return;
  setSyncing();
  const {consulId:cid, empresaId:eid, eixoId:xid} = STATE;
  const emp   = (STATE.data[cid]?.empresas||{})[eid] || {};
  const eixo  = (emp.eixos||{})[xid] || {};
  const tarefas = [...(eixo.tarefas||[]), { txt, done: false }];
  await update(eixoRef(cid,eid,xid), { tarefas });
  setSynced();
  closeModal();
  toast('Tarefa adicionada');
};
